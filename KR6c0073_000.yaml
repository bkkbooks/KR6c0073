front:
  text: 金剛經如是解自述金剛者性喻也性無形似落言即非天竺先生不得已而有言於是名之以般若名之以阿耨多羅三藐三菩提猶謂文字日繁本來不多故於經首拈出如是兩字如是者性體也不變不異何容解何容不解遇慧命人如須菩提者深機相觸秘義盡宣曰如是住如是降伏又曰如是生清淨心其言布施也曰應如是布施其言果報也曰福德亦復如是其需解人也曰如是知如是見如是信解是以深明佛法擔荷如來則曰如是人等無異人也讚嘆世尊則曰如是世尊無異物也其感極涕零則曰得聞如是之經無異法也三十二分實相妙智不可思議者語盡忘言兀坐說偈不過曰作如是觀而已故知金剛本體古佛聖賢如是歌利凡夫亦如是祗舍王城恒沙塔廟如是五百世以前五百世以後阿僧祗世界亦無不如是自黃梅首宣經旨解者八百餘家然親切道者惟六祖一言了之曰法非有無謂如皆是佛法謂是揆其旨不過以如是心演如是經成如是佛耳余持此經二十年口頭薄業苦無證入迨遭劫灰桎梏刀鋸投荒沉獄一袱隨身夢寐護念迄于生還寓京師者又五年乃取誦本與素所與默疑和尚閉關九年商量語及黃蘗山中所得西影禪師遺偈入都來間於長春寺聽御生說法復入西山叩一齋識其漫談皆若得若失乃掩卷靜對覺經上白文如如本體躍躍紙上特為向來業識迷覆不見耳信手隨錄久遂成帙雖與如是本體未必脗合然八百家解者不如是而我欲盡歸之如是此亦如如本性活活在我身中不能自異於如來與凡夫者寧我作如是解哉名以般若名以阿耨多羅三藐三菩提佛說已多而況無住無相無得無說之法以如是覓如是以如是解如是乎故如而還之無如是而還之無是解而還之無解余以此自悔自懺因號無是道人焉寓跡石鏡山中無是道人自記金剛經如是解序初祖達摩西來特稱楞伽四卷可以印心究不若金剛一卷常為心印是以黃梅五祖首行倡導宣其經旨從而作解者八百餘家曹溪六祖初既因文悟入後復以之啟口作壇經更了以一言曰法非有無謂如皆是佛法謂是應知此經佛與須菩提一句一棒一字一喝語言文字剗盡無餘的的教外別傳西來第一義為佛祖慧命所統于群經中尊勝稱王信也其文藏有三譯元魏留支陳天竺真諦二譯要不如姚秦鳩摩羅什所譯辭特簡明義無脫誤是以震旦誦習日月爭光而註釋多門意見差別愚自弱冠志學即知三教會通丙辰歲以梁生奇緣皈依憨山大師于東遊之日得受金剛決疑以為指歸其大意謂佛說法三十年上首弟子猶是懷疑此經隨空生所疑處即便逐破所謂疑悔永已盡安住實智中憨師現示肉身于曹溪稱七祖與六祖覿面是能不隨分演說真契佛祖心印并契宣尼一貫無言之大旨者即南嶽之得金剛無礙智中峰之能用世語入佛知見不過是也越今四十餘載其間所聞演說所見著述描抹此經面目者不知幾何而乃得見坦公先生如是解是直以鏡照鏡諸相不立以光接光眾塵消隕只提如是我聞四字便攝全經并攝全藏若水入乳若芥投針梵語華言拈來即合引申觸類無境不融以至孔孟精微和盤托出老莊玄妙徹底掀翻頭頭盡獲家珍無假揉和窠臼自非降大任而投險囏出自困衡動忍安能與箕疇岐易同放光明更非宗教全彰福慧兩足從入泥入水中履道坦坦安得具金剛眼得金剛心代佛口宣無上甚深妙諦現長者宰官身而為說法具眼者謂是無垢再來覆按時節因緣當益信也此解早已壽梓于吳門鎮海古剎茲重梓藏冊流通于楞嚴經坊將紫栢憨山兩尊者同向寂光首肯真歷劫勝因也古德有云見聞為種八難超十地之堦解行在躬一生圓曠劫之果則以無是翁作如是解即謂如如六如悉歸剩義如之一字亦不喜聞可也是萬法俱來絲毫不掛之第一義也順治丁酉臘八日擕李道一居士譚貞默槃談謹撰金剛如是解序神功不可以記溟渤不可以蠡測無上妙道不可詮註唯其詮註不及也雖終日言而無言終日跡而無跡故迦文曰我四十九年不曾說著一字又曰但有言說都無實義譬之彈者意在獲而彈斯委餌者意在魚得魚而餌自棄若夫執餌彈為魚非作者咎乃時人自昧耳無是張公究心金剛有得不肯獨擅其妙欲以公之天下于致君澤民之餘鈎索深而箋釋之命曰如是解歲在丁酉以方伯涖武林出全秩屬序焉余披讀已顧謂二三子曰全經妙旨為如是二字一口道盡矣他如品第文句雖有數千餘言不過二字之訓詁耳後來循行下註者華竺亡慮千人要之如析空立界各封己私雖空性非離而用力勞矣惟天親無著立義明宗破疑斷執差達佛意然猶不能離句絕非直指第一義諦斯解也得之于心不借舌於玄旨形之于辭匪寄意于私緣冥中著彩水面雕紋有是事無是理隨人所得而見之其裨補于拘學也厥功大哉山野不能文抑亦法不換機以致鋪錦之贊但曰世尊如是說無是公如是解山野如是序只此三箇如是猶塗毒鼓響不容接似太阿劍鋒不可攖又如雲端鶴唳石竅風鳴既未可以理通亦不許以意解讀是經者便如是將去直與說者解者同一金剛體性同一無住三昧詎必數盡行墨名言始信無我人眾生壽者相哉雖然認餌彈為魚者固謬矣苟得一魚一遂欲使天下人盡棄餌彈而勿用吾知斯人亦不足以語道也前哲不云乎實際理地不受一塵佛事門中不捨一法夫然則雖家喻此經戶傳此解正金剛種子之光明顯發處也庸何傷山野恁麼序引是真實語是不誑不妄語具眼者薦取靈隱道人弘禮題
