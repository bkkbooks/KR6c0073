body:
  text: 寓石經山河北無是道人注解般若會中都門孫北海承澤河陽薛行屋所蘊膠州張天石若麒同閲金剛般若波羅蜜經五金皆謂之金金剛者如刀劒之有剛鐵剛在金中百鍊不消取其堅利能斷萬物有如智慧能絶貪嗔癡一切顛倒之見般若梵語唐言智慧波羅蜜梵語唐言到彼岸欲到彼岸須憑般若經者徑也載最上乘上菩提路大鑑禪師金剛序云金在山中山不知是寶寶亦不知是山由無性故人則有性取其寶用得見金師破山取礦用火烹鍊得成精金四大身中性亦云爾世界中有人我山人我山中有煩惱礦煩惱礦中有佛性寶佛性寶中有智慧匠用覺悟火烹鍊見自性金剛了然明淨是故以金剛為喻也圓覺經曰譬如銷金礦金非銷故有雖復本來金終以銷成就可知金剛不落空虗煅煉原有功用此經亦名小般若乃大部六百卷中第五百七十七卷名小般若者謂一卷能涵大部之義非般若有大小也此經盛行於世自黃梅五祖始王世貞宛委餘編載秦穆公時扶風獲一石佛公不識棄污穢中後染疾夢天譴責問由余對曰周穆王時有化人來云是佛神王為造中天臺公乃命由余視之曰真佛神也公以三牲祀之由余曰佛法清淨所有供養燒香而已譯經圖記云明帝感異夢敕郎中蔡愔等迎摩騰法蘭用白馬䭾經此後來事謂佛法至漢始入中國非也法會因由分第一如是我聞一時佛在舍衛國祗樹給孤獨園與大比丘衆千二百五十人俱爾時世尊食時著衣持鉢入舍衛大城乞食於其城中次第乞已還至本處飯食訖收衣鉢洗足已敷座而坐如是我聞者如來涅槃時示阿難一切經首皆安如是我聞佛言覺也自覺覺他覺圓滿故舍衛國波斯匿王所居祗樹者祗陀太子所施給孤獨園者給孤獨長者之園即布金滿地處比丘梵語華言乞士上乞法於諸佛下乞食於人間也千二百五十人三迦葉目犍連舍利弗五人弟子共合此數如是二字即為全經之髓六祖云法非有無謂之如皆是佛法謂之是故住曰如是住降伏曰如是降伏布施曰如是布施福德曰福德亦復如是清淨曰如是生清淨心又曰如是知如是見如是信解又曰如如不動又曰作如是觀每每機鋒相投則曰如是如是孔曰一言終身其恕乎恕者如心也故曾悟一貫亦曰忠恕子思之未發孟軻之不動總無二義故經云諸法如義我聞者固聞之於佛亦聞之於我也阿難現身聞相何所聞何所不聞夫子之文章可得聞也一時者在衛之時爾時者入城之時時長老須菩提乃問法說法之時佛法隨時示現即所謂聖之時者不拘一時也一切時中無時不在道也者不可須臾離也舉舍衛國祗樹園以見微塵剎土草木樓觀頭頭皆是真如不獨我有諸大比丘衆一切人天并及異類俱是共有孔云吾無行而不與二三子者是丘也故千二百五十人俱此性俱此般若即俱此佛體世尊傳心諭衆相諭不言政在穿衣吃飯處討箇下落故著衣乞食了不異於人折我憍心生彼施福也還至本處乃影借語本地可還即我之本來亦可還也飯食已畢收衣鉢者所以狀佛之脫粘染而歸於無也洗足者亦以狀空塵也敷座而坐寧靜登禪入於化矣蓋菩提實性無出入相無往復相祗舍王城不即不離次第乞內與還至本處原無二見到敷座而坐則住心降心俱在此中為第二分預示機關須在解人自悟有僧參忠國師師問蘊何事業曰講金剛經師曰最初兩字是甚麼曰如是師曰是甚麼僧無對師曰咄哉將甚麼講經僧問趙州乞指示州曰吃粥了也未僧云吃粥了州云洗鉢盂去僧大悟六祖曰心念不起是為坐故收鉢洗足敷座要向這裏參始得按是經以無相為宗前人以無我相四句當四句偈此分首章曰我聞是我相也乞食城中是人相也大比丘衆是衆生相也曰佛曰世尊是壽者相也不應執著如此余曰此種種諸相俱在還至本處後掃之不舉其地其人則落斷見舉而不掃則落常見余常序林任先參詳注云無我相者非無我也無人相者非無人也無衆生相壽者相者非無衆生與壽者也不可以身相得見如來者非無身也不住相布施者非無布施也無定法可說者非無法也過去未來見在心不可得者非無心也無所住者非無住也皆從有說到無蓋不著有便是無了達摩曰廓然無聖梁武不省乃曰對朕者誰若了此義則三十二相俱消化于敷座而坐中矣善現起請分第二時長老須菩提在大衆中即從座起偏袒右肩右膝著地合掌恭敬而白佛言希有世尊如來善護念諸菩薩善付囑諸菩薩梵語須菩提此言善吉善現空生尊者雲庵僧了性曰須菩提人人有之若人頓悟空寂之性故名解空全空之性真是菩提故名須菩提空性生出萬法故名空生空性隨緣應現利人利物亦名善現萬行吉祥亦名善吉言偏袒者此土謝過請罪則肉袒西土興敬禮儀則偏袒言右肩者作用取便言右膝者佛法尚右世尊佛號也空生開言便歎希有作何見解蓋金輪王子一旦舍王屋入雪山此事甚為希有弟子雲從隨緣乞食了不動情此道更為希有如來者真性謂之如明則照無量世界而無所蔽慧則通無量劫而無所礙能變現為一切衆生而無所不可是能自如者也自如則無去來而謂之來者蓋以應現於此而謂之來也然則言如者乃真性之本體言來者乃真性之應用如來二字兼佛之體用而言之矣菩薩者梵語本云菩提薩埵此云覺有情有情則衆生也一切衆生具佛性者皆有生而有情惟菩薩在有情之中而能覺者故謂之覺有情也菩薩未能盡絶情想惟修至佛地則絶情矣護者護持念者憶念俾不退轉也付者付託囑者訂囑俾不斷絶也諸菩薩指大衆而言世尊善男子善女人發阿耨多羅三藐三菩提心云何應住云何降伏其心善男子者正定心也善女人者正慧心也菩薩是善因成熟者男女是善因初發者梵語阿此云無梵語耨多羅此云上梵語三此云正梵語藐此云等梵語菩提此云覺阿耨多羅三藐三菩提乃無上正等正覺也謂真性也真性即佛也略言之則謂之覺詳言之則謂之無上正等正覺也真性無得而上之故云無上然佛不獨上衆生不獨下正相平等故云正等佛不獨悟衆生不獨迷其覺公普故云正覺也初發心時先求安心故有此問人天住有二乘住空故曰如何應住降者化逆從順煩惱即菩提也伏者遏抑妄心轉識成智也十住中第一發心住先言住後言降伏者住是進修著腳之處降伏二字只到如來地位方了盡也佛言善哉善哉須菩提如汝所說如來善護念諸菩薩善付囑諸菩薩汝今諦聽當為汝說善男子善女人發阿耨多羅三藐三菩提心應如是住如是降伏其心唯然世尊願樂欲聞諦審也唯者諾其言然者是其言佛因須菩提所問最契於心故首肯曰善哉善哉仍牒其言而約之曰發菩提心者即當如是住如是降伏其心如是者即開首如是二字如如不動之意也謂所發欲善護念善付囑之心原無別法即此心如是便已是住是降伏矣此外非更有安住降伏之法也黃蘗云凡夫多被境礙心事礙理不知乃是心礙境理礙事但令心空境自空理寂事自寂勿倒用心也可知如是即是住如是即是降伏孔子曰吾道一以貫之曾子曰唯及門弟子皆所不解世尊曰如是住如是降伏其心須菩提曰唯然亦非千二百五十人所解解之云何亦曰中心如心中心即如心如如不動而已大乘正宗分第三佛告須菩提諸菩薩摩訶薩應如是降伏其心所有一切衆生之類若卵生若胎生若濕生若化生若有色若無色若有想若無想若非有想若非無想空生問佛先言應住佛告空生先言降伏其心以降伏者進修之極則而無住者降伏之要旨如是降伏即如是便是降伏了直指祕密更無別義到底無四相無滅度總要降伏此有我度衆生之心而已上言善男信女此言菩薩摩訶薩可見佛與衆生總如是心總如是降伏也摩訶言大心量廣大不可測量卵生者貪著無明迷暗包裹也胎生者食色輪回煩惱成聚也濕生者愛水浸淫貪嗔癡因此而得也化生者一切煩惱本自無根起妄想心忽然而有也起心著相妄見是非名為有色執著空相不修福慧名為無色窮智極慧思之思之鬼神通之名為有想頑空坐禪不學慈悲猶如木石無有作用名為無想不著偏見亦不了中道有如象罔故名若非有想求理心在故名若非無想我皆令入無餘涅槃而滅度之如是滅度無量無數無邊衆生實無衆生得滅度者涅槃者即不生滅也涅而不生槃而不滅即脫生死也無餘涅槃者大涅槃也謂此涅槃之外更無其餘故名無餘涅槃蓋盡諸世界所有九類衆生皆化之成佛也一切衆生皆自業緣中現若為人之業緣則生而為人修天上之業緣則生於天上作畜生之業緣則生為畜生造地獄之業緣則生於地獄九類衆生無非是業緣而生者是本來無此衆生也菩薩既已覺悟無邊煩惱轉為妙用又豈更有一衆生得滅度處若見衆生可度即是生滅即是我相而四相熾然矣良由一切衆生本來是佛何生可度故曰平等真法界佛不度衆生衆生自性自度我何功哉壇經云自性自度名為真度淨名經云一切衆生本性常滅不復更滅又佛告清淨慧菩薩言於實相中實無菩薩及諸衆生菩薩衆生皆是幻化幻化滅故無取證者凡經內所云衆生非衆生凡夫非凡夫等語皆是無佛無衆生之義何以故須菩提若菩薩有我相人相衆生相壽者相即非菩薩四相者貪嗔癡愛所影現而成貪則自私自私是我相嗔則分別爾汝是人相癡則頑傲不靈是衆生相愛則希覬長年是壽者相如來不以度衆生為功而了無所得以其四相盡化也圓覺經云未除四種相不得成菩提設若有一於此則必起能度衆生之心便是衆生之見非菩薩矣四相中一我字是緊要的窟穴有我則尊我卑人因有人相欲度人又欲盡乎人因有衆生相盡滅度之力還而證我成壽者相遂妄認壽者為涅槃而牢不可化矣故我相是四相病根也佛每言衆生者非言衆生而實言衆生之我也無我則無衆生亦無壽者矣朱晦翁曰所謂降伏者非謂遏伏此心謂盡降伏衆生之心入無餘涅槃中教他都無心了方是脉望曰鬼神有性無命草木有命無性禽獸性少命多惟人能全之可知四生六道之義妙行無住分第四復次須菩提菩薩於法應無所住行於布施所謂不住色布施不住聲香味觸法布施須菩提菩薩應如是布施不住於相何以故若菩薩不住相布施其福德不可思量須菩提於意云何東方虗空可思量不不也世尊須菩提南西北方四維上下虗空可思量不不也世尊須菩提菩薩無住相布施福德亦復如是不可思量須菩提菩薩但應如所教住上言度生無相此即言布施無住行於布施不落空見布施無住亦不落有見如此則布施即是般若故曰應如是布施如此則福德亦是般若故曰福德亦復如是總就如何應住而詳言之以明如是之性其布施其效應無不如是也色聲香味觸法六者謂之六塵眼貪色耳貪聲鼻貪香舌貪味身境相接謂觸意事相拘謂法人性清淨本無六根六塵又向何處安頓東西南北及四維上下總謂之十方菩薩不住相布施是能施之體空也一切諸相即是非相是所施之法其體空也又說一切衆生即非衆生即所施之人其體空也玄奘譯經云不住於色不住非色是故無空可取無有可捨空有同如一體平等施心廣大猶若空虗所獲功德亦復如是楞嚴云汝觀世間可作之法誰為不壞然終不聞爛壞虗空此云不可思量以廣大言而無盡無壞其意皆備如來教菩薩法不過住無所住菩薩受如來教但當如其所教者以為住不住有故入塵勞而不落生死不住無故居涅槃而不屬斷滅如如不動而已如所教住明乎有住者在大學曰有所好樂則不得其正心不在焉故也故無在則無不在無住則無不住如理實見分第五須菩提於意云何可以身相見如來不不也世尊不可以身相得見如來何以故如來所說身相即非身相佛告須菩提凡所有相皆是虗妄若見諸相非相即見如來此如來乃謂真性之佛與下身相之如來異自布施說到法身言之愈切自法身說到諸相言之愈廣皆以明無相之旨佛有三身法身報身化身也如來係自性真如豈有身相四大色身皆由妄念而生若執著身相而欲見如來之性譬如認賊為子終無是處惟見諸相非相則見如來者非盡除諸相也見諸相者病為執有除諸相者病為執空惟就諸相見非相乃為中道蓋了妄即真非別於妄外有真耳故能就幻相以見實相則四相者相也法相者亦相也非法相者亦相也楞嚴經云不取一切法相則得聖智究竟相也俱胝和尚凡有所問只竪一指博山曰人人一箇指頭他因甚這等會用人人有箇身相如來偏恁會用凡夫爭盡氣力落得肉臭軀殼正信希有分第六須菩提白佛言世尊頗有衆生得聞如是言說章句生實信不佛告須菩提莫作是說如來滅後後五百歲有持戒修福者於此章句能生信心以此為實當知是人不於一佛二佛三四五佛而種善根已於無量千萬佛所種諸善根聞是章句乃至一念生淨信者須菩提如來悉知悉見是諸衆生得如是無量福德上言若見諸相非相即見如來恐人謂得見如來為希有之法狐疑轉生故問生實信否不知此實信一念可以立千百年而不渝可以統千萬佛而同根不獨我能見如來而如來亦悉知悉見我之一念必如是而後為能生實信法輪預記云初五百歲解脫居多二五百歲禪定居多三五百歲或務多聞四五百歲或營塔寺五五百歲多聞鬪諍蓋天道五百年一大變君子之澤久而愈斬屬望後人自爾如是持戒者不著諸相即是持戒持戒即是修福善根者萬善從生為衆善之根本也生淨信上有乃至二字當從生信心以此為實來上二句是全體之信而乃至以下則頓悟之信也一念者心空境寂萬慮消亡不作有為見不作無為解出四相越三空是名一念淨信便與如來心心相印故曰悉知悉見淨信心便是如是心如是心便是最上第一希有之法十方無盡之虗空皆在如是福德中矣何以故是諸衆生無復我相人相衆生相壽者相無法相亦無非法相何以故是諸衆生若心取相則為著我人衆生壽者若取法相即著我人衆生壽者何以故若取非法相即著我人衆生壽者是故不應取法不應取非法以是義故如來常說汝等比丘知我說法如筏喻者法尚應捨何況非法實信之心至於清淨豈復有四相可見哉既無四相又豈有法相可見哉又豈有非法相可見哉無四相是人空也無法相無非法相是法空也如是所生淨信豈曰容易故將若心取相次第深言而歸之於法空曰不應取法不應取非法皆以明法空也至於不取非法不但證法空亦脫法空之障矣以四相為相者乃心取相也知四相之非相而離之即是法相知離相之亦非而復離之即是非法相甚矣取之病根深矣如筏喻者筏所以渡河也既渡則不須用筏矣何必言筏非筏法所以破相也既破則不須用法矣何必言法非法此法不住此岸不住彼岸不住中流以不應取故楞嚴經云不取無非幻非幻尚不生幻法云何立即此分文意維摩詰問文殊師利如何是不二法門殊云於一切法無說無言無示無識離諸問答是為入不二法門文殊復問維摩仁者如何說維摩默然若再加一語是落第二義老子曰善行無轍迹善言無瑕謫是以聖人善救人無棄人善救物無棄物如來說法為救人救物而設其轍迹瑕謫如何可尋無得無說分第七須菩提於意云何如來得阿耨多羅三藐三菩提耶如來有所說法耶須菩提言如我解佛所說義無有定法名阿耨多羅三藐三菩提亦無有定法如來可說何以故如來所說法皆不可取不可說非法非非法所以者何一切賢聖皆以無為法而有差別無上菩提乃第一義深妙難名或持戒忍辱而得之或精進禪定而得之或聚沙為塔或稱南無皆可得之豈可以拘以空法而名之哉如來憫衆生之未悟安得默然而無言或為志求勝法者說或為求無上慧者說或為求聲聞者說或為求辟支佛者說應機四酬隨叩而答寧無說哉然妙性平等云何有得若有所得佛從外來道本無言何云有說若有所說是為謗佛謝云非法則不有非非法則不無有無並無理之極也金剛標云空生自云解佛所說義只解其無定法可說尚未解其為無得無說也如謂不可取不可說即是無得無說何後第十分中如來重問于法有所得否而空生始答無所得也十三分中佛又重問如來有所說法不而空生始答如來無所說也則無定法之與無得無說又隔一間矣以者用也無為者自然覺性無假人為故一切賢聖皆用此無為之法然法本無為而一切法未必盡是佛法遂生差別或安而行之或勉而行之及成功則一也以無為法釋上非法賢聖差別釋非非法道川云江北城枳江南橘春來都放一般華藥山升座良久便下座院主請云云何不垂一言山曰經有經師論有論師爭怪得老僧孔子曰四時行焉百物生焉豫何言哉其機甚深學者不從禪靜入耳依法出生分第八須菩提於意云何若人滿三千大千世界七寶以用布施是人所得福德寧為多不須菩提言甚多世尊何以故是福德即非福德性是故如來說福德多若復有人於此經中受持乃至四句偈等為他人說其福勝彼何以故須菩提一切諸佛及諸佛阿耨多羅三藐三菩提法皆從此經出須菩提所謂佛法者即非佛法此以財施有漏之因以較無為之福三千大千者一佛化境也七寶雖多心有能所即非福德性能所心滅是名福德性福德性直到成佛地位超然數量之外自此經出者此經是金剛般若而實相觀照文字三般若皆在其中若非文字將何者為他人說乎然法從經出而經非即法恐人執法為經執經為法故隨言即非佛法以遣之四句偈者中峰云經中凡言四句偈必上有乃至二字下有等字未嘗單言四句則全經皆是不必指定色見我一切有為無我相等句也傅大士云若論四句偈應當不離身以是而觀則四句偈者初不假外求而在吾心地明矣六祖偈云人我俱盡妄想既除言下成佛向使此偈可以言傳面命我佛乃天人之師住世七十九年廣為衆生說法三百五十度而於此經凡一十四處舉四句偈而終不明明指示端的豈吝其辭而不為說破耶蓋恐人執指為月而徒泥紙上之死句而不能返觀自己之活句也佛法非佛法者隨說隨剗也即心是佛更無別佛即心是法更無別法黃蘗云欲要真實會一切總不是萬松云端的委細會一切無不是可以互參世尊一日升座文殊云諦觀法王法法王法如是博山別曰世尊未升座法王法在甚處這裏如參透乃知焚鈔竪拂總非釋氏之法御氣燒丹總非老氏之法多學默識總非孔子之法一相無相分第九須菩提於意云何須陀洹能作是念我得須陀洹果不須菩提言不也世尊何以故須陀洹名為入流而無所入不入色聲香味觸法是名須陀洹須菩提於意云何斯陀含能作是念我得斯陀含果不須菩提言不也世尊何以故斯陀含名一往來而實無往來是名斯陀含須菩提於意云何阿那含能作是念我得阿那含果不須菩提言不也世尊何以故阿那含名為不來而實無不來是故名阿那含須菩提於意云何阿羅漢能作是念我得阿羅漢道不須菩提言不也世尊何以故實無有法名阿羅漢世尊若阿羅漢作是念我得阿羅漢道即為著我人衆生壽者上言一切賢聖皆以無為法而有差別不但賢與聖有差別而就賢人中亦各有差別然其於無為一也於無得亦一也須陀洹名為入流者欲入無為之理舍凡入聖初入聖流也而無所入者本性自空不假緣入即鑽之彌堅也斯陀含名一往來者色身雖有來去而法身湛然不動不見操存舍亡也阿那含名為不來者迎之不見其首而實無不來者隨之不見其後也阿羅漢能作是念而得道者前三果人居有學位故立果義以酬因阿羅漢不事學問人也乃立道名以顯證極故不曰阿羅漢果而曰阿羅漢道法華經曰諸法不受亦得阿羅漢若萌一得念即落人我四相尊己輕人慢視衆生期壽長久種種見前是凡人之見非聖人之徒矣世尊佛說我得無諍三昧人中最為第一是第一離欲阿羅漢我不作是念我是離欲阿羅漢世尊我若作是念我得阿羅漢道世尊則不說須菩提是樂阿蘭那行者以須菩提實無所行而名須菩提是樂阿蘭那行梵語三昧此云正定亦云正受乃謂入定思慧法也非謂玄妙之意佛恐衆不知去所得心故引己作證無諍者即解脫義也諍是勝負心無諍則無我無人無高無下無聖無凡一相平等蓋凡有對待即成諍端長繫死生何由能脫故涅槃經曰須菩提住虗空地若有衆生嫌我立者我當終日端坐不起嫌我坐者我當終日立不移處如此不起一煩惱謂之無諍無諍則正定正定則離欲離欲即解脫阿羅漢即般若也樂者好也阿蘭那梵語無諍也樂阿蘭那行猶云好無諍人也夫萌之於心者曰念見於修為者曰行有所念則必有所行有取行則必有取得須菩提得無諍三昧有是行也且曰無所行者以心無所得也有是行而心無所得故世尊以樂阿蘭那名之蓋無為法中本無一法生本無一法滅無煩惱可斷無涅槃可證但是一念不生而已心地觀云若不捨離我我所執不應安住阿蘭若中若心調柔無有諍論故當安住阿蘭若中後人本此遂以蘭若名佛住處云四果皆曰能作是念作行病淺作念病深無所入無往來無不來無有法皆四果之不作念處佛之有四果即儒之有四配也顏欲從末由參以魯得之思不覩不聞孟勿忘勿助何嘗作念若顏到屢空處即阿羅漢到無所得道處其于空空如也本體一間耳莊嚴淨土分第十佛告須菩提於意云何如來昔在然燈佛所於法有所得不不也世尊如來在然燈佛所於法實無所得須菩提於意云何菩薩莊嚴佛土不不也世尊何以故莊嚴佛土者即非莊嚴是名莊嚴上言四果無所得正欲明佛果無所得也故此即明言之云不獨汝等見我無法可得即我見然燈佛亦無法可得也然燈佛釋迦牟尼佛授記之師如來於佛法既無所得故菩薩於佛土即非莊嚴蓋一大世界必有一佛設化皆謂之佛土而菩薩於佛土之中作種種善事以變易其世界如黃金為地七寶為樹林樓臺故謂之莊嚴然真性中豈有此莊嚴哉其莊嚴非莊嚴也惟真性為真莊嚴也維摩經云隨其心清淨則佛土淨蓋此心清淨即是莊嚴佛土奚外飾為莊嚴佛土三句第一句莊嚴佛土者是假觀是俗諦屬相宗第二句即非莊嚴是空觀是真諦屬空宗第三句是名莊嚴是空假俱融真俗無礙是中道觀中道諦屬性宗是故須菩提諸菩薩摩訶薩應如是生清淨心不應住色生心不應住聲香味觸法生心應無所住而生其心須菩提譬如有人身如須彌山王於意云何是身為大不須菩提言甚大世尊何以故佛說非身是名大身梵語菩薩摩訶薩此云覺衆生菩薩莊嚴既不在於外飾則當反而求之於心心能如是自然清淨不必更求清淨故云應如是生清淨心凡住六塵而生其心者皆非清淨心也惟無所住而生其心者乃清淨心也無所住之心便是不生如是生清淨心便是不滅無生之生何礙於生知不滅即是生不必更求生相矣佛言六塵之苦每以色為先而繼之以聲香味觸法蓋以見色者人情之所易入故觀照為先經中凡言觀者皆從見起也須彌山在四天下中為極大故名山王須彌雖大有為生滅劫燒不免縱使身如須彌亦非清淨本體乃業力相持非不壞也何如無所住之為大哉故言佛土即非莊嚴者是真土無形非身是名大身者是法身無相身土皆空心境雙絶始是般若極則非土之土常寂光也非身之身大法身也林兆恩曰身之極樂國也如來禪定於其中矣而釋流則西方之身之蓬萊島也神仙逍遙於其中矣而道流則海外之列禦寇曰橫心之所念而後眼如耳耳如鼻鼻如口無不同也不住色聲香味生心其理如是無為福勝分第十一須菩提如恆河中所有沙數如是沙等恆河於意云何是諸恆河沙寧為多不須菩提言甚多世尊但諸恆河尚多無數何況其沙雪山有四洲其東牛口磽伽河即恆河也佛以此河沙為喻者蓋說法時常近此河耳一沙即為一河河尚無數何況其沙此喻最為微妙為世人沒大愛河隨順欲流漂沒瀰漫甚為可愍此中政當尋筏到岸須菩提我今實言告汝若有善男子善女人以七寶滿爾所恆河沙數三千大千世界以用布施得福多不須菩提言甚多世尊佛告須菩提若善男子善女人於此經中乃至受持四句偈等為他人說而此福德勝前福德天地間河沙無盡人亦無盡古往今來生生不息小德川流豈但河沙耶為人解說三千大千世界皆獲法施皆悟無住相布施豈河沙可數與受持四句偈不為惡業所縛可以悟明真性為人解說而人亦得聞此理而悟明真性脫離輪回永超生死萬劫無有盡期故其福德殊勝也佛嘗言財施有盡法施無窮財施不出欲界法施能出三界華嚴云譬如暗中寶無燈不可見佛法無人說雖慧不能了是則解說之功與受持相輔而大矣楞伽云譬如恆沙是地自性經劫火燒地性不壞如來法身亦復如是譬如恆河人獸踐踏不生分別如來解脫亦復如是譬如恆沙不增不減如來智慧亦復如是此章讚般若最勝處發衆生信受之心此福德勝前福德者所謂智慧寶洲求則得之求有益於得也七寶恆沙得之有命熟讀孟子便得尊重正教分第十二復次須菩提隨說是經乃至四句偈等當知此處一切世間天人阿修羅皆應供養如佛塔廟何況有人盡能受持讀誦須菩提當知是人成就最上第一希有之法若是經典所在之處即為有佛若尊重弟子六祖云隨說者逢凡說凡逢聖說聖也謝云封殯法身謂之塔樹像虗空謂之廟所在之處見人即說是經常行無所得心無所住心令諸聽者生清淨心是名真供養即此身中有如來全身全舍利故言如佛塔廟果禪師云即心是佛更無別佛即佛是心更無別心如拳作掌似水成波波即是水掌即是拳也弟子者學居師後故稱弟解從師生故稱子尊重弟子謂弟子之可尊重者乃大弟子菩薩之流也東印國王請二十七祖般若多羅齊王曰何不看經祖云貧道入息不居陰界出息不涉衆緣常轉如是經百千萬億卷要知經典所不在亦為有佛如法受持分第十三爾時須菩提白佛言世尊當何名此經我等云何奉持佛告須菩提是經名為金剛般若波羅蜜以是名字汝當奉持所以者何須菩提佛說般若波羅蜜即非般若波羅蜜是名般若波羅蜜須菩提於意云何如來有所說法不須菩提白佛言世尊如來無所說如來前云一切佛法皆從此經出故空生請名此經竝問云何奉持夫妙明本性湛若太虗何處得名如來恐人生斷滅見不得已而強安是名也蓋人性如金之剛故能斷除一切煩惱直至彼岸故曰般若波羅蜜然能觀無所觀照無所照空無所空到無所到故曰即非般若波羅蜜惟是不觀而觀不照而照不空而空不到而到故曰是名般若波羅蜜從前問答都是因相破相此則立名遣名夫般若既無可名之名又豈有所說之法故重申問答而云如來無所說也無所說者直下無開口處所以世尊臨入涅槃文殊請佛再轉法輪世尊咄云吾住世七十九年未嘗說著一字須菩提於意云何三千大千世界所有微塵是為多不須菩提言甚多世尊須菩提諸微塵如來說非微塵是名微塵如來說世界非世界是名世界須菩提於意云何可以三十二相見如來不不也世尊不可以三十二相得見如來何以故如來說三十二相即是非相是名三十二相華嚴經云三千大千世界以無量因緣乃成一切衆生豈此外而別有世界悟者處此迷者亦處此悟者之心清淨心也以此心處此世界即清淨世界迷者之心塵垢心也以此心處此世界即微塵世界諸微塵者一切衆生心上微塵也佛分身於微塵世界中示現無邊法力開闡清淨無垢之法使一切衆生皆生清淨心非微塵所可污故云非微塵得出世界法非世界所得囿故云非世界世尊答文殊曰在世離世在塵離塵是為究竟法楞嚴中於一毛端現寶王剎坐微塵裏轉大法輪皆是離世離塵之意三十二相始從足下安平終至頂肉髻相皆屬修成然如如真佛何相之有恐人疑前說塵性空界性空遂執有佛身根性殊不知佛身根性亦空也此分大意謂細而微塵大而世界妙而佛之色身皆為虗妄惟真性為真實是以自古及今無變無壞彼三者則有變壞故也須菩提若有善男子善女人以恆河沙等身命布施若復有人於此經中乃至受持四句偈等為他人說其福甚多以恆河沙等身命布施終受頑福畢竟不明本性所謂住相布施也若受持四句一念見性人法俱空即名正見所得淨妙無相無為功德豈有限量可名中庸一撮土之多微塵意也及其廣厚萬物載焉世界也微塵積而為世界世界析而為微塵皆誠之不可已處中庸無實非虗佛法無虗非實此分總言所以名經與所以持經功夫可以貫串全經自為一部故與前後語多重復不覺其煩謂為先後聽經者說非是離相寂滅分第十四爾時須菩提聞說是經深解義趣涕淚悲泣而白佛言希有世尊佛說如是甚深經典我從昔來所得慧眼未曾得聞如是之經世尊若復有人得聞是經信心清淨則生實相當知是人成就第一希有功德世尊是實相者則是非相是故如來說名實相世尊我今得聞如是經典信解受持不足為難若當來世後五百歲其有衆生得聞是經信解受持是人則為第一希有何以故此人無我相無人相無衆生相無壽者相所以者何我相即是非相人相衆生相壽者相即是非相何以故離一切諸相則名諸佛空生在前解悟空理是於有中見空止得人空今聞般若非般若是名般若竝得法空故深解義趣感極涕零若非佛恩撥我慧眼安能聞如是二字便是真諦此如是性中具如來法身即是實相人法俱空善惡諸相自然寂滅故曰實相非實相也生者以是人之信解為生而實相畢竟無生耳圓覺云一切實相性清淨故功德者即成就法身便是莫大功德第一希有經以福兼德言者屢矣而此獨單言功德不及福者是功成果滿之時其福為不足道也以所壇經有功德在法身中非在于福之句此段文義三疊上言我未曾聞如是之經隨言若復有人得聞是經繼言來世衆生得聞是經言人則可大言來世則可久蓋佛在時為正法之世佛滅度後為像法之世若當來世後五百歲為末法之世衆生能信解受持亦見四相非相即契般若同此實相即同此無相耳悟則是佛迷則是衆生佛與衆生性豈有異離相者即相以空相非除相以即空也佛告須菩提如是如是若復有人得聞是經不驚不怖不畏當知是人甚為希有何以故須菩提如來說第一波羅蜜即非第一波羅蜜是名第一波羅蜜須菩提忍辱波羅蜜如來說非忍辱波羅蜜是名忍辱波羅蜜空生悟到此將清淨心滿盤托出直指如是本體佛又何言故嘆曰如是如是不驚者聞慧也不怖者思慧也不畏者修慧也第一波羅蜜者有十種一布施二持戒三忍辱四精進五禪定六智慧七慈八悲九方便十不退今言第一波羅蜜者獨言布施為第一曰布施者通攝萬行直至菩提尚行法施也言非者行無住相布施也佛于第四分說無住便說行於布施故于此分足之一說第一波羅蜜實以般若為第一楞嚴說第一波羅蜜亦指般若六祖說摩訶般若波羅蜜最尊最上最第一是也悟諸相非相即達彼岸故名第一既悟人法俱空即無生死可度無彼岸可到故非第一忍辱波羅蜜者即十度中第三也能忍辱方不起嗔心以昏亂真性故能到諸佛菩薩彼岸佛有時自稱如來自稱佛謂己與諸佛菩薩無異性也若了悟人法俱空亦掃忍辱之相般若體中原無辱可忍亦無忍可見忍無可忍能所俱無方成于忍是名為忍也何以故須菩提如我昔為歌利王割截身體我於爾時無我相無人相無衆生相無壽者相何以故我於往昔節節支解時若有我相人相衆生相壽者相應生瞋恨須菩提又念過去於五百世作忍辱仙人於爾所世無我相無人相無衆生相無壽者相歌利王梵語此云無道極惡如來因地修行在山中宴坐遇歌利王遊獵以宮女禮拜仙人王大怒遂支解仙人仙人無嗔恨體復如故憍陳如以此得度五百世是於釋迦成道世中逆數向前說到五百世也遇歌利時是作忍辱仙世中一世之事重言之者言修忍非一世事益見忍於歌利者非容易也忍辱即是法施六度萬行其實以布施為大因割截而歌利得度豈徒忍辱乎故曰法施也夫自心邪見如歌利王殘害法身如截身體黃蘗大師云才起心向外求者名為歌利王愛遊獵心不外馳名忍辱仙人身心俱無即是佛道肇法師云五蘊身非有四大本來空將頭臨白刃一似斬春風應生嗔恨者謂色身與法身即有不同也割截之時不見有身相即不見有我人衆生壽者四相何處更著嗔恨是故須菩提菩薩應離一切相發阿耨多羅三藐三菩提心不應住色生心不應住聲香味觸法生心應生無所住心若心有住即為非住就忍辱而推之一切俱應離相蓋心常空寂不生起滅我相捐而一切之相俱捐然離相所發之心正覺心也正覺現前邪妄自伏更將何法以降其心所發之心即正等心也諸法唯心即是實相復將何地為求應住先言色後言聲香味觸法者我見等見法眼等眼皆從色遇心經亦云無眼界乃至無意識界亦同此意佛法不離色聲香味觸法蓋因衆生根器假六塵而設化若住著六塵則心已死唯即六塵而不住六塵則心常生生則發生心體本空既空諸有心地了了自如何嘗不生故住於法即為非住凡夫執心以除事智者空心不空事是故佛說菩薩心不應住色布施須菩提菩薩為利益一切衆生故應如是布施如來說一切諸相即是非相又說一切衆生即非衆生又即一切之中摘出布施言之以菩薩為利益一切衆生故應以如是之心布施不住於相若不如是布施則是誣衆生為著色一切有相反陷溺此衆生矣以色字統六根觀照之心從見而入為證性之機竅也七寶雖滿大千界等須彌山亦有時而盡惟無諸欲之求無能施之心亦無所施之物以如是相喻則含靈抱識均被其澤布施之心但應如是華嚴經云不為自身求快樂但為救護諸衆生諸相非相者畢竟可破壞非真實體也衆生非衆生者若離妄心即無衆生可得也真性之中佛與衆生俱泯何容菩薩住相化求須菩提如來是真語者實語者如語者不誑語者不異語者須菩提如來所得法此法無實無虗真語者一切含生皆有佛性也實語者一切法空本無所有也如語者一切萬法如如不動也不誑語者聞如是法皆得解脫也不異語者一切萬法本來空寂於何而異也此心本體不可言有不可言無有而不有無而不無言辭不及其唯聖人乎故曰無實無虗諸相非相故無實即見如來故無虗須菩提若菩薩心住於法而行布施如人入暗即無所見若菩薩心不住法而行布施如人有目日光明照見種種色布施謂法施天之神聚於日故為光人之神聚於目故為見住法而行布施者二乘之人不見色而住色譬如不見坑穽而墜坑穽不住法而行布施者菩薩見色而不住色譬如見坑穽則不墜坑穽矣須菩提當來之世若有善男子善女人能於此經受持讀誦即為如來以佛智慧悉知是人悉見是人皆得成就無量無邊功德迷則為男子悟則為如來佛之智慧即人之智慧也佛之功德即人之功德也無量無邊功德又超功德而言蓋成就無上菩提功德莫大於是六祖云見性是功平等是德念念無滯常見本性真實妙用名為功德往於碧峰山下參一齊和尚問佛實相和尚云三國關漢侯使是古來大佛祖余曰關夫子大節殉身如何便是佛祖僧曰即心是佛關侯生平事心之道無絲毫遺憾古今人心各各有關聖便是割截身體體復如故處余是其言附記於此僧問西影禪師或有聞佛正法不能了悟更待來生還得聞否師曰有甚來生要了此時即了有何缺缺更待來生是謂無志氣改頭換面千刓萬刓按無我相等句至此三見第三分是就菩薩說第六分是就衆生說此分是就來世衆生說熟讀自見諸解皆言為續到聽法者重說失之遠矣持經功德分第十五須菩提若有善男子善女人初日分以恆河沙等身布施中日分復以恆河沙等身布施後日分亦以恆河沙等身布施如是無量百千萬億劫以身布施若復有人聞此經典信心不逆其福勝彼何況書寫受持讀誦為人解說須菩提以要言之是經有不可思議不可稱量無邊功德初日分謂晨中日分謂午後日分謂暝於此三時以恆河沙等身命布施百千萬億劫無量無數雖受無量福報乃世間福耳受世間福者即染煩惱之因聞此經典信心不疑則見自性矣見自性則深明實相人法二空乃是大悟人為出世間福佛恐世人執著如來忍辱之說徒以身布施而於自己性與他人性無少利益故於十三分言之至此復言不可思議者謂不可以心思不可以言議不可稱量者謂不可以稱稱不可以器量無邊功德者若著人法則落有無二邊際惟深明實相即同佛心無有邊際既無邊際可按即無思議稱量可施壇經云諸三乘人不能測佛智者患在度量也饒伊盡思有推轉加懸遠御生云書寫屬身業受持屬意業解說屬口業三業氷清其福豈有倫匹哉蘇軾跋金剛經云昔有人受持此經常以手指作捉筆狀于虗空中寫諸經法是人去後此寫經處雨不能濕亦不可思議處如來為發大乘者說為發最上乘者說若有人能受持讀誦廣為人說如來悉知是人悉見是人皆得成就不可量不可稱無有邊不可思議功德如是人等則為荷擔如來阿耨多羅三藐三菩提何以故須菩提若樂小法者著我見人見衆生見壽者見即於此經不能聽受讀誦為人解說須菩提在在處處若有此經一切世間天人阿修羅所應供養當知此處即為是塔皆應恭敬作禮圍繞以諸華香而散其處乘者車乘之乘大乘謂菩薩乘阿羅漢獨了生死不度衆生故云小乘唯能自載而已緣覺之人為中乘如車乘之適中者也菩薩為大乘謂如車乘之大者普能載度一切衆生也此經欲普度衆生故為發菩薩大乘者說發乃起發謂起發此以濟度衆生也最上乘者佛乘也佛又能兼菩薩而載度之則在大乘之上故為最上乘然此經為大根者說豈拒絶於小哉孔子云夫婦之愚不肖可以與知與能故又云皆得成就謂諸凡小乘皆載此乘共登佛頂耳如來無上菩提智悲無量功德只在擔荷二字擔荷者不屬別人即是如是人等如如不動便能擔荷得起若生種種諸見謂我有智慧照破煩惱便落二乘見解羊鹿等機上智大根決不如是小法者小乘法便是有餘涅槃安得法華授記也人我衆生壽者不曰相而曰見由粗入細見分屬內相分屬外有粗細之別若有此經譬如摩尼寶珠瑞光輝煥即此處即是如來真身舍利寶塔非重此經也重此聽受誦讀也此持經者所當自有聞思修慧缺一不可文字云乎哉解脫之性巍巍高顯故云是塔華香散處開敷知見熏植萬行即法界性自然顯見於其問耳書寫是手具般若屬身根受持是心具般若屬意根誦讀是口具般若屬舌根皆自利事為人解說是利人事到利人則法施極則為擔荷如來之大事列子周穆王時西極有化人來王與同遊及化人之宮若屯雲焉視王宮榭如纍塊積蘇此雖寓言與佛莊嚴塔廟其理不異西極化人非古佛乎記之備考肅宗問忠國師百年後須何物師云與老僧作個無縫塔帝不會天童頌曰孤逈逈圓陀陀眼力盡處高峨峨可知即為是塔不是七級浮屠能淨業障分第十六復次須菩提善男子善女人受持讀誦此經若為人輕賤是人先世罪業應墮惡道以今世人輕賤故先世罪業即為銷滅當得阿耨多羅三藐三菩提此分經中專為破罪而言先世罪業應墮惡道何以今世尚能持誦政第六分中能生信心種諸善根者故能生淨信持誦此經也持經即見清淨本心造罪由心造罪性本空心滅罪亡宿業何有蓋先世罪業即前念妄心今世輕賤即後念覺心故當得無上正等正覺也為人輕賤先世罪業即為消除則輕賤亦是便益此所以割截身體亦不嗔恨須菩提我念過去無量阿僧祗劫於然燈佛前得值八百四千萬億那由他諸佛悉皆供養承事無空過者若復有人於後末世能受持讀誦此經所得功德於我所供養諸佛功德百分不及一千萬億分乃至算數譬喻所不能及阿僧祗那由他梵語皆無數之謂歷無數劫供無數佛求福而已不若持此真經見我本性永離輪回五祖云終日供養只求福田不求出離生死苦海自性若迷福何可救是故供佛功德雖百分百千萬億分乃至算數之多皆不及持經功德之一分也所比功德不以他人所得之功德比之即以如來自己供養諸佛之功德比之乃愈見其親切梁武帝造寺布施供佛設齊問祖師達磨有何功德答曰實無功德後人不了此意韶州韋使尹因問六祖六祖曰造寺布施供佛設齊名為修福不可將福以為功德功德在法身中非在修福須菩提若善男子善女人於後末世有受持讀誦此經所得功德我若具說者或有人聞心即狂亂狐疑不信須菩提當知是經義不可思議果報亦不可思議具盡也我若盡說其功德人則狂亂狐疑不信以其極大不免驚怪無上醍醐翻成毒藥不可思議者心無所住豈容思無法可說豈容議思議有盡境不可思議無盡境也經義不可思議所為如是之經果報不可思議所為福德亦復如是也如如之體稍涉擬議便落第二義稍涉因果便落有為福即如梁武苻堅捨身迎佛無救于亡而歌利割截身體體復如故此中可著參解哉蓋阿含教中罪福熾然般若教中罪福皆空博山異和尚曰此段經文縛殺多少人若以因果評之入地獄如箭射今世輕賤是見在先世罪業是過去於後末世是未來受持讀誦則三心俱不可得業障於何處見究竟無我分第十七爾時須菩提白佛言世尊善男子善女人發阿耨多羅三藐三菩提心云何應住云何降伏其心佛告須菩提善男子善女人發阿耨多羅三藐三菩提心者當生如是心我應滅度一切衆生滅度一切衆生已而無有一衆生實滅度者何以故須菩提若菩薩有我相人相衆生相壽者相則非菩薩所以者何須菩提實無有法發阿耨多羅三藐三菩提心者應無所住應如是降伏其心第三四分已言之至此再舉者蓋前從菩薩身上說此從善男女發心說此接引苦心也蓋既開示降住之法恐人謂我能住我能降伏我能發心猶是眼中金屑故此再問云何降心應住此發心者比前轉深義謂前教於法應無所住是則佛果菩薩亦不可住矣發阿耨多羅三藐三菩提心者當生如是心即如如不動之心即佛法無二之心也生如是心則是法矣此又言實無有法發阿耨多羅三藐三菩提心何也蓋當生如是心者以無所住而生也若有生之之心便非如是之心故如是心亦應除遣蓋能度所度能滅所滅能降所降能住所住皆落法執佛恐誤認所謂生如是心者故此說破然則非徒無滅度衆生一切相而并此發求真性之心者亦本無也求性之心尚有微細四相但少有悟心是我相見有智慧能降伏煩惱是人相見降伏煩惱竟是衆生相見清淨心可得是壽者相不除此念皆是有法故云實無有法發菩提心豈易究竟須菩提於意云何如來於然燈佛所有法得阿耨多羅三藐三菩提不不也世尊如我解佛所說義佛於然燈佛所無有法得阿耨多羅三藐三菩提佛言如是如是須菩提實無有法如來得阿耨多羅三藐三菩提此法字比前問又深前云有法義屬于他是心外之見此云有法義屬于自乃內心之障既發菩提心則無修無證何法可得如是如是者兩心善契佛與然燈佛須菩提總在無法無得中矣此如字即如來之如亦即法如之如又即此經如如不動之如也佛與空生相對又復何言須菩提若有法如來得阿耨多羅三藐三菩提者然燈佛則不與我授記汝於來世當得作佛號釋迦牟尼以實無有法得阿耨多羅三藐三菩提是故然燈佛與我授記作是言汝於來世當得作佛號釋迦牟尼何以故如來者即諸法如義與我授記當得作佛者因智慧而得見本性也若有能所之心即是有法可得性同凡夫如何得授記釋迦之義此云能仁牟尼之義此云寂默能仁者心量無邊含容一切寂默者心體本寂動靜不生也如來者謂真性佛蓋如者謂真性遍虗空世界而常自如又隨所感而來現故名如來詳言之則為阿耨多羅三藐三菩提略言之則為如來又略言之則為佛淨名云如者不二不異一切法如也一切衆生衆聖賢乃至彌勒亦如也諸佛菩提涅槃亦如也來亦如也去亦如也如如之中何容一法真性妙明中天杲日於諸法上都無取捨是諸法如義若有人言如來得阿耨多羅三藐三菩提須菩提實無有法佛得阿耨多羅三藐三菩提須菩提如來所得阿耨多羅三藐三菩提於是中無實無虗是故如來說一切法皆是佛法須菩提所言一切法者即非一切法是故名一切法須菩提譬如人身長大須菩提言世尊如來說人身長大則為非大身是名大身凡言得者皆自外而得此真性豈有自外而得哉故言得者則為不實語也無實者以菩提無色相故無虗者色相空處即是菩提如來所證菩提之法不空不有故曰無實無虗諸法皆是用之以修行而成佛之名也佛即是法法即是佛馬祖云一切衆生從無量劫來不出法性三昧若能一念回光返照全體聖心何處不是佛法故言一切法皆是佛法然佛恐人泥於法隨又掃去謂諸法實無所得故云即非一切法古德云用即知而常寂不用即寂而常知也皆是佛法故無虗即非一切法故無實色身有相即非大身法身無相廣大無邊故為大身恐人不識法身真理故舉此譬之御生云一切法皆是佛法者如青青翠竹咸是真如法身鬱黃華無非自性般若言一切法即非一切法者如海慧云黃華若是般若般若即同無情翠竹若是法身法身即同草木如人喫笋喫著法身以是即非俱不可說故如來于勝義般若中巧施法句曰假名一切法皆是法王身須菩提菩薩亦如是若作是言我當滅度無量衆生則不名菩薩何以故須菩提實無有法名為菩薩梵語菩薩此云覺衆生菩薩亦如是者法性本如不變不異不礙隨緣佛性本如不變不異不礙隨緣非于如是外菩薩有最上希有之法也佛外無法故如來無菩薩可得法外無佛故無法為如來所得淨名經云色性自空非色滅空如病眼人見空中華無有是處惟無有法不見有生死不見有善惡不見有凡聖不見一切法是名見法正見之時了無可見耳經中有云作是念有云作是言言者從聽法說欲其廣也念者從內心說欲其細也是故佛說一切法無我無人無衆生無壽者須菩提若菩薩作是言我當莊嚴佛土是不名菩薩何以故如來說莊嚴佛土者即非莊嚴是名莊嚴須菩提若菩薩通達無我法者如來說名真是菩薩佛說一切法竝無我人諸相是法本無我安得纖毫有我莊嚴佛土便是心有能所便是罣礙皆不通達無我法也鈔云佛土者心土也以定慧之寶莊嚴心內佛土者菩薩也不言其功而人莫見其跡以金珠之寶莊嚴世間佛土者凡夫也自言其功而常急於人見文殊般若經云為一切衆生發大莊嚴之心不見莊嚴之相是也無我法者即楞伽經所云二無我謂人無我與法無我也人無我者謂人無本體因業而生法無我者謂法無本體因事而立若作富貴之業則生於富貴中作貧賤之業則生於貧賤中是人本無體也若因欲渡水則為舟楫之法因欲行陸則為車輿之法是法本無體也馬祖云自性本來具足但於善惡事上不滯方喚作修道人取善捨惡觀空入定皆屬造作一念妄想便是三界生死根本但無一念是除生死根本即得法王無上珍寶故曰真是菩薩莊子云黃帝遺珠惟象罔得之若有法能得菩提便是無象中著象故唯無所得乃為真得故老子曰失者同于失同于失者失亦樂得之知失之為得永得矣一體同觀分第十八須菩提於意云何如來有肉眼不如是世尊如來有肉眼須菩提於意云何如來有天眼不如是世尊如來有天眼須菩提於意云何如來有慧眼不如是世尊如來有慧眼須菩提於意云何如來有法眼不如是世尊如來有法眼須菩提於意云何如來有佛眼不如是世尊如來有佛眼十七分中所言菩薩亦如是言菩薩當學如來也故節節言如來分上事如是世尊極其讚美亦不能於如是下別添毫末五眼皆如是所變現而成華嚴經云肉眼見一切色故天眼見一切衆心故慧眼見一切衆生諸根境界故法眼見一切法如實相故佛眼見如來十方故般若經所謂清淨五眼是也一切凡夫皆具五眼而被迷心蓋覆不能自見如無迷心妄念則翳障退滅五眼開明見一切色也有僧問尊宿云觀音菩薩用許多手眼作甚麼尊宿云通身是手眼若人於這裏睜得一眼也無須菩提於意云何如恆河中所有沙佛說是沙不如是世尊如來說是沙須菩提於意云何如一恆河中所有沙有如是沙等恆河是諸恆河所有沙數佛世界如是寧為多不甚多世尊如來說法常指恆河為喻有如是沙等恆河者謂一粒沙為一恆河也佛世界者謂一凡夫世界必有一佛設化故凡夫世界皆謂之佛世界黃檗云佛說是沙諸佛菩薩釋梵諸天步履而過沙亦不喜牛羊螻蟻踏踐沙亦不怒珍寶馨香沙亦不貪糞泥臭味沙亦不惡此心即無心之心衆生與佛更無分別佛告須菩提爾所國土中所有衆生若干種心如來悉知何以故如來說諸心皆為非心是名為心若干種心如來悉知以此心起念時便屬妄根自佛觀之則有形相矣有形相故可得而知也若寂然如虗空則無得而知矣且所謂他心通者謂彼既起心念則可得而知也昔有人把碁子於手中令他心通者觀之則知其為碁子以己知為碁子故也然己則不知其數之多寡使彼言之則亦不知其數以己不知其數故也如佛者豈止他心通而已哉故無量衆生一起心念皆悉知已妄心即非心覺妄之心亦為非心本無妄念不起妄心是自性本心故云是名為心所以者何須菩提過去心不可得現在心不可得未來心不可得心意搆逗隨時流轉故有三世若悟真一之心即無過去現在未來若有過去心可滅即是自滅若有未來心可生即是自生既有生有滅即非常住真心即成六十二種邪見九百種煩惱過去未來現在三心皆不可得即此是為非心亦即此是名為心種心之心屬妄非心之心屬真為心之心則真妄混一即中道也二祖云覓心了不可得初祖云與汝安心竟此能覓之心即了不可得之心也與安心豈非是名為心乎可以知心之義矣昔妙吉祥菩薩見一人云我造殺業決墮地獄如何救度菩薩教之謁佛佛曰汝造殺業從何心而起為過去耶未來耶現在耶若起過去心者過去已滅若起未來心者未來未生若起現在心者現在不住三心俱不可得故即無起作無起作於其罪相何所見耶心之自性即諸法性諸法性空即真實性汝不應妄生怖畏是人聞佛說法即悟罪業性空不生怖畏羅山問巖頭起滅不停時如何頭咄云是誰起滅天童頌云紛紛起滅是何物過去未來現在皆心起滅而成但識是誰起滅即便心空境寂法界通化分第十九須菩提於意云何若有人滿三千大千世界七寶以用布施是人以是因緣得福多不如是世尊此人以是因緣得福甚多須菩提若福德有實如來不說得福德多以福德無故如來說得福德多此再發明無住相布施以明福德亦歸無相之意疏鈔云若據捨大千珍寶布施其福極多若執著希望福德有為則有盡故不為多福德無故者無希望心也是名無為福正如空谷來風谷不與風期而風自至又如深山産木山不與木期而木自生故福德為多因緣二字是眼此分為佛因下二十分色身諸相為佛果因無相果亦無相故次第明之溈山問仰山一切衆生但有業識茫茫無本可據博山別曰業識茫茫與諸佛不動智相去幾何譬夫貧者握金成土富者握土成金其變動一也福德有無之義明矣蘇軾阿羅漢頌曰爾以捨來我以慈受各獲其心寶則誰有離色離相分第二十須菩提於意云何佛可以具足色身見不不也世尊如來不應以具足色身見何以故如來說具足色身即非具足色身是名具足色身須菩提於意云何如來可以具足諸相見不不也世尊如來不應以具足諸相見何以故如來說諸相具足即非具足是名諸相具足十九分之福德因無相也二十八之具足果無相也具足色身三十二相具足諸相八十種好壇經云皮肉是色身華嚴經云色身非是佛觀此則知肉身無如來殊不知有真如來存焉知色身非法身殊不知有妙色身存焉華嚴經云清淨妙色身神力故顯現曰妙色身則現一切色身三昧便是法身非別有神力以顯法身也凡夫見說諸相不可得恐著於空謂觀空莫非見色見色莫不皆空則失之枯寂矣殊不知空色一如有無不異能於無身而見一切身無相而見一切相則色身諸相何嘗缺缺哉具足諸相便有住相意諸相具足便是無我相作用東坡居士曰衆生剛狼自用莫肯信入故諸賢聖皆隱不見獨峨眉五臺廬山天台猶出光景變異蓋慈悲深重急于接物具足諸相其應現亦然故有頌曰願解此相是誰縛爾具足諸相是急于接物處即非具足是解相縛處大悲閣記云牽一髮而頭為之動拔一毛而身為之變然則髮皆吾頭而毛孔皆吾身也彼皆吾頭而不能為頭之用皆吾身而不能具身之智則物有以亂之矣又云非無身無以舉千萬億身之衆非千萬億身無以示無心之至非說所說分第二十一須菩提汝勿謂如來作是念我當有所說法莫作是念何以故若人言如來有所說法即為謗佛不能解我所說故須菩提說法者無法可說是名說法前云無定法可說但隨宜所說而所說皆不可取是猶有說至此則徹底掃去直云無法可說莫作是念乃決言之不惟無其說并無其念也楞伽云若不說一切法者教化則壞故知無說非杜默不言但以無所住心而說此說遍天下無乖法之過也顏曰終日喫飯不曾喫著一粒米終日著衣不曾掛著一莖絲是以我佛橫說直說四十九年未曾道著一字若言如來有所說法便不能解會我所說直饒說得天華亂墜也落在第二著唯能坐斷十方打成一片非言語可到是名真說法也孔云豫欲無言老云知者不言要知無言不言是所以言便知無說處是所以說矣爾時慧命須菩提白佛言世尊頗有衆生於未來世聞說是法生信心不佛言須菩提彼非衆生非不衆生何以故須菩提衆生衆生者如來說非衆生是名衆生慧命者善現達佛智海入深悟門慧悟無生覺本原之命非去非來故曰慧命生信心則著佛見故曰非衆生不信則著凡夫見故曰非不衆生此二見者皆須掃除聖凡同盡不隔二界故曰衆生衆生者如來說非衆生是名衆生有人問如何是大地衆生同成佛西影曰他見得衆生是佛才是自信自佛你若不信還是衆生道德經云絶聖棄智民利百倍又云常使民無知無欲孔子曰民可使由之此衆生本來面目三教聖人別無法門無法可得分第二十二須菩提白佛言世尊佛得阿耨多羅三藐三菩提為無所得耶佛言如是如是須菩提我於阿耨多羅三藐三菩提乃至無有少法可得是名阿耨多羅三藐三菩提須菩提恐聽法者雖屢聞無得尚未能生實信之心或仍謂如來於菩提為有所得故復問以決明之佛言如是如是則無復可言矣又申言無有少法可得此不但空有二法不可得也即中道亦不可得故隨說是法平等三諦俱圓矣阿難問迦葉尊者云世尊傳金襴袈裟外別傳個甚麼迦葉云倒却門前剎竿著阿難言下大悟方知此道只在當人分上本無傳受西影示衆云學道求明白的心是最痛的病根世人貪愛情境便落苦海你今貪戀佛法亦名苦海淨心行善分第二十三復次須菩提是法平等無有高下是名阿耨多羅三藐三菩提以無我無人無衆生無壽者修一切善法則得阿耨多羅三藐三菩提須菩提所言善法者如來說即非善法是名善法如是本體在六道中心亦不減在諸佛中心亦不增是名平等報父母恩重經云物不能平物惟水不動則可以平物物不能等物惟權衡則可以等物平則無高無下等則無重無輕此可謂法之至善者矣雖然佛凡同是一法豈有所謂善法者為佛偏得哉故曰即非善法因上言無少法可得此即言是法平等則得與無得總平等也平等者正覺本體若一切聖賢皆以無為法而有差別如何得平等故所謂善法者即非善法蓋求佛求菩提涅槃便屬貪病故曰佛病最難治福智無比分第二十四須菩提若三千大千世界中所有諸須彌山王如是等七寶聚有人持用布施若人以此般若波羅蜜經乃至四句偈等受持讀誦為他人說於前福德百分不及一百千萬億分乃至算數譬喻所不能及此示修一切善法者勿離無我等觀而墮有漏之因也佛以性上福德為最上以身中七寶為希有須彌雖大七寶雖多若誦真經并四句偈說與他人是修自性上福德煩惱生死各人自了是何等觀照何等持行故曰算數譬喻所不能及六祖曰乘船永世求珠不知身是七寶湯若望曰欲明地球之廣當論經緯一度為幾何里今約二百五十里為一度乘以周地之數得九萬里佛氏乃云須彌山上至忉利天下至崑崙際又云四天下皆有一須彌山則塞滿地球不能容也此理極是然儒曰共工氏頭觸不周山又曰女媧補天釋與儒皆寓言耳未偏廢也化無所化分第二十五須菩提於意云何汝等勿謂如來作是念我當度衆生須菩提莫作是念何以故實無有衆生如來度者若有衆生如來度者如來則有我人衆生壽者實無衆生得滅度前已兩見皆在菩薩分上說至此專在如來分上說所以示菩薩也衆生本來寂滅實無有待如來滅度若如來欲滅度衆生是於本寂滅之衆生上添出我人等相而曰我當度衆生豈其然乎作念字最是病根墨子曰兼者大利之所生也別者大害之所生也有利兼愛之心便是作念度衆生處此未達一間之論世儒不知以墨為佛取笑孟軻氏矣須菩提如來說有我者即非有我而凡夫之人以為有我須菩提凡夫者如來說即非凡夫是名凡夫如來既無我人等相云何有時稱我又有時稱凡夫此所謂隨舉隨掃也上言我與凡夫是謂舉下言我與凡夫是謂掃與其掃之曷若不舉蓋不舉則無以明其理譬如過渡而不用筏者也不掃則恐人泥其說譬如到岸而不登乃住於筏上者也此所以必舉之而又必掃之凡夫著我相故有我如來不著我相故無我著四相即是凡夫離四相即非凡夫孔子得力曰毋我釋氏得力亦曰無我我之為病不特以色聲求者為有我即說斷滅者亦為有我比之孟子求在我者深矣法身非相分第二十六須菩提於意云何可以三十二相觀如來不須菩提言如是如是以三十二相觀如來佛言須菩提若以三十二相觀如來者轉輪聖王即是如來須菩提白佛言世尊如我解佛所說義不應以三十二相觀如來第五分已言此意矣恐須菩提執相之病未除故又作此問且欲明無斷滅相先從有相者徵之空生疑謂肉相非真固不可以三十二相見如來然法化非二似欲觀如來者亦不必離三十二相也以無實無虗即如是之心如是之法此固大阿羅漢之解也佛恐衆生不達空生之解但執應身相好以觀如來故又以轉輪聖王即是如來難之而空生即悟復云不可以三十二相觀如來也轉輪者如輪之轉以照四天下故名轉輪聖王其色身亦具足三十二相雖修好衆相即是心有生滅生滅心多終不是清淨本心佛乃說偈以證之爾時世尊而說偈言若以色見我以音聲求我是人行邪道不能見如來音聲色相本自心生分別之心皆落邪道若能見無所見聞無所聞知無所知證無所證邪正都冥方見如來上言有我者即非有我而凡夫之人以為有我故我相者不可著也我相每從色聲而入即是邪道非觀自在菩薩之道也故曰不能見如來華嚴經云色相非是佛音聲亦復然亦不離色聲見佛神通力佛法不離處便是不即處若離却色聲又于何地覓如來此偈不能見如來與後偈作如是觀同意陰符經曰心生於物死於物機在於目老子曰不見可欲孔子答回問仁以視為首朱氏云求於心須目在佛氏之學以觀門為最故屢及之此偈反言以見性蓋道之微妙者非言說可及佛之所謂禪即儒之所謂仁道之所謂丹皆不可說也孔子終日言仁曰為仁曰不違仁曰好仁曰近仁曰鮮矣仁終未言仁是何物故曰子罕言仁道家玄牝守中終未言丹是何物此偈曰以色見以音聲求不能見如來終不能言如來在何處後偈言有為法如夢幻泡影終不能言無為是何法微乎微乎非顏回莊周須菩提不能解此無斷無滅分第二十七須菩提汝若作是念如來不以具足相故得阿耨多羅三藐三菩提須菩提莫作是念如來不以具足相故得阿耨多羅三藐三菩提須菩提汝若作是念發阿耨多羅三藐三菩提心者說諸法斷滅莫作是念何以故發阿耨多羅三藐三菩提心者於法不說斷滅相二十分中言如來不應以具足色身見恐人過執反墮頑空故又深一層說如來雖不著色身然不可作離色身一念若作是念便落斷滅之見斷滅者槁木死灰豈有相但作是念則有是念故作有相觀固是一邊見不作有相觀即是斷滅見真如法性不是有不是無湛然不動觀與不觀皆是生滅故云莫作是念也學者不可墮於常見亦不可墮於斷見常見則即相見佛緣相發心非也斷見則離相覓佛相外發心亦非也昔張拙秀才參西堂藏禪師問三世諸佛是有是無藏答云有拙不解藏云曾參見什麼人來拙云參見徑山來某甲問徑山皆言無藏云居士有何骨肉曰有一妻二僕藏云徑山有何骨肉曰無藏云待先輩得似徑山時便可一切皆無大凡未見性人如何便說一切皆無此一分是全經中鐵門限前後俱以無相無得無說無法為宗非此一分定執空矣往訪黃檗經卓吾中郎參禪處得壁上無念和尚偈云三十年來不住功窮來窮去却無蹤而今窮得無依倚不是真空定執空無念不識文字經師王瓜茄子一語點破遂大悟按佛氏以無相為宗忽出無斷無滅一分以救空虗之障後儒何得以寂滅病之試看顏氏仰鑽瞻忽卓立末由與佛氏夢幻泡影何異倘非有博文約禮二語後儒亦將以異端非之矣微乎微乎如通此解乃知喟然而歎即所謂凡所有相皆是虗妄也循循善誘即所謂諸相非相即見如來也欲從末由即所謂如來于法實無所得也聖門第一學問人自然如是不受不貪分第二十八須菩提若菩薩以滿恆河沙等世界七寶持用布施若復有人知一切法無我得成於忍此菩薩勝前菩薩所得功德何以故須菩提以諸菩薩不受福德故須菩提白佛言世尊云何菩薩不受福德須菩提菩薩所作福德不應貪著是故說不受福德通達一切法無能所心是名為忍大般若有安受忍觀察忍修此二忍便得無生法忍此處知字便是觀察忍成字便是安受忍合之便得無生法忍菩薩了悟真性同於太虗不曾生滅凡夫隨六塵轉即有生滅故塵起即心起塵滅即心滅不知所起滅心皆非心也若見起滅不生功德有何著處天親菩薩云無我即無作者無作者亦無受者諸法清淨是名順忍由一事以至事事忍力成就自得無生樂故云得成於忍福德自然隨之如人行日中本不為日影而日影自然隨之非為作福德而度衆生也雖受而不貪著其受故說不受不是說斷滅相取於非法不修諸度也忍字刃在心上非大力不能老子曰勇於敢則殺勇於不敢則活孔子云小不忍則亂大謀然非徒恃忍力也淮南子曰萬物有所生而知守其根藏于不敢行於不能唯知無我法則觀察所至不忍者誰忍者又誰此佛所以為大雄氏也威儀寂靜分第二十九須菩提若有人言如來若來若去若坐若臥是人不解我所說義何以故如來者無所從來亦無所去故名如來妙性中原無來去坐臥衆生亦如是如來亦如是行住坐臥四威儀中非動非靜上合諸佛下等群生一性平等故號如來此分三言如來皆謂真性佛也無所從來者不生也亦無所去者不滅也色聲起時從何而起色聲滅時從何而滅色聲自有起滅我心湛然豈有來去寂而常照照而常寂行住坐臥無不清淨也昔肅宗皇帝詔國一禪師入內道場師見帝起身帝曰禪師何必見寡人起身師曰檀越何得於四威儀中見貧道要知來去坐臥中無不是如來一合理相分第三十須菩提若善男子善女人以三千大千世界碎為微塵於意云何是微塵衆寧為多不甚多世尊何以故若是微塵衆實有者佛即不說是微塵衆所以者何佛說微塵衆即非微塵衆是名微塵衆世尊如來所說三千大千世界即非世界是名世界世界碎而為微塵微塵積而為世界皆是因果相生愈出愈多自己真性非因非果能與六道衆生為因果故世界起於微塵輪回由於一念因果原是妄心自作自受一念悟來即無微塵世界何有空生因佛問塵界二字深悟佛旨遂發明塵界俱非實有佛亦不煩再示故言一合相不可說以答之何以故若世界實有者即是一合相如來說一合相則非一合相是名一合相須菩提一合相者即是不可說但凡夫之人貪著其事真形遍虗空世界又無形相故一而不可分之以為二合而不可析之以為離非有相也但強名為一合相而已六祖云一合相者眼見色愛色即與色合耳聞聲愛聲即與聲合至於六塵皆然合即是凡夫散即非凡夫凡夫之人於一切法皆合相若菩薩於一切法皆不合而散何以故合即是繫縛生滅處即是凡夫所以經云貪著其事顏曰微塵雖多未足為多世界幻成終無實義若說實有微塵實有世界即是彼此著相彼既是相我又著相兩相相合謂一合相圓悟禪師云你但上不見有諸佛下不見有衆生外不見有山河大地內不見有見聞覺知好惡長短打成一片一一拈出更無異見地藏問修山主近日南方佛法如何爭如我這裏種田博飯喫修云如三界何藏云你喚甚麼處作三界微塵世界亦如是觀知見不生分第三十一須菩提若人言佛說我見人見衆生見壽者見須菩提於意云何是人解我所說義不不也世尊是人不解如來所說義何以故世尊說我見人見衆生見壽者見即非我見人見衆生見壽者見是名我見人見衆生見壽者見心生則種種法生相之為病皆起於見也佛言此四相只見其性不見其相疊前三遍再說者是佛分別棄身見性之義也始即令諸學人先除粗重四相如大乘正宗分所說也次即令見自性之後復除微細四相如究竟無我分中說也此二分中即皆顯出理中清淨四相若於自心無求無得湛然常住是清淨我見若見自性本自具足是清淨人見於自心中無煩惱可斷是清淨衆生見自性無變無異不生不滅是清淨壽者見須菩提發阿耨多羅三藐三菩提心者於一切法應如是知如是見如是信解不生法相須菩提所言法相者如來說即非法相是名法相如是二字直指法身實際以所見之妄相既空則能見之妄見亦泯知見信解總應如是此真實般若究竟極則不必另求法相然初入道時不假法相故無入頭處既見性了亦當遠離此相所謂得魚忘却筌到岸不須船之說所以末後為汝剗却云即非法相是名法相學佛者不但形相不可著法相亦不可著也百丈禪師云法身即虗空虗空即法身虗空與法身無異相佛與衆生無異相生死與涅槃無異相煩惱與菩提無異相離一切相即是佛應化非真分第三十二須菩提若有人以滿無量阿僧祗世界七寶持用布施若有善男子善女人發菩提心者持於此經乃至四句偈等受持讀誦為人演說其福勝彼前言恆河沙等世界七寶尚屬有量此則言無量阿僧祗世界七寶是極言其多也以是布施尚不及受持演說得福為多蓋發菩提心者是大乘最上乘人也凡夫四大色身豈能說法聽法是他本來孤明通徹十方的解說解聽如此持經其心自是不生不滅無掛無礙其福可知云何為人演說不取於相如如不動何以故一切有為法如夢幻泡影如露亦如電應作如是觀如何為人演說可見不是口吻邊話說不取於相如如不動心體本空相亦是空人法俱空是真演說也真如之性不生不滅不斷不常不來不去無顛倒無變異是真如如上如字是體下如字是用心境一如本無動搖譬如鏡中現影無如不可有為法者一落于法皆有為也經云一切法皆是佛法佛豈離法者哉但著于法則為法所泥故有夢幻泡影露電之喻以見所謂佛法者即非佛法也如夢者心之所想而非本心也如幻者謂假此以設教非可挑燈更覓火也如泡者水聚成泡泡散復為水如影者形生影見形消即影滅如露者滋潤草木之長草木自有性也如電者光燭陰黑之際光去還成空也夢幻泡影四喻喻法本空露電二喻喻法無常本空則無常無常則歸空故法法本無法也如是觀者不動不靜不生不滅無為無不為定觀止觀更無異法佛鑑和尚示衆舉僧問法眼不取於相如如不動如何法眼云日出東方夜落西其僧有省若也於此見得方知道旋風偃嶽本來常靜江河兢注元自不流憨山曰琴瑟雖有妙音非妙指不能發衆生雖具妙心非妙觀不能顯故示三觀門曰空觀曰不空觀曰中道觀觀至中道非寂非照如如平等佛說是經已長老須菩提及諸比丘比丘尼優婆塞優婆夷一切世間天人阿修羅聞佛所說皆大歡喜信受奉行僧謂之比丘尼姑謂之比丘尼居士謂之優婆塞道姑謂之優婆夷一切世間之人及天上之人阿修羅神乃六道中之三道也此照應首章與大比丘衆等語聞佛所說具聞慧也皆大歡喜具思慧也信受奉行具修慧也至理無言真空無相說是經已仍歸無言諸色天人終歸無相金剛之義盡矣皆大歡喜是佛法普度廣大結願處凡人有得則歡喜佛法無得故為大歡喜凡人具足則歡喜佛法具足非具足故為大歡喜皆大歡喜則人人菩提人人彼岸人人涅槃也不獨摩頂受記為歡喜即為人輕賤亦歡喜不獨福德不可思量為歡喜即割截身體亦歡喜道川頌曰如客歸鄉如子見娘是為如是大道場按是經開首便說如是兩字中間節節皆詮如是義故總結全經則曰作如是觀如是觀者比如是知如是見如是信解更為了徹禪之正諦不過觀照而已心經開首即曰觀自在菩薩易曰觀盥而不薦道德經曰內觀其心心無其心陰符經曰觀天之道又曰機在於目孔曰觀其所由顏曰瞻之在前孟曰莫良於眸子莊曰冥冥之中能見曉焉觀之一法原為入禪機竅故木經人我等見皆曰見佛法等眼皆曰眼如是觀則以不觀為觀而無不觀如如不動諸法如義即其所為觀也故曰作如是觀乃妙智正覺金剛般若全經之宗旨也每見詮道之書皆以起首為結證如中庸天命之謂性末則曰上天之載上論曰時習末則曰時哉時哉大學曰明德通篇總是明德於天下孟軻曰仁義而已矣通篇皆是仁義又何疑此經如是起首不如是結束乎由此言之則四句偈即以此當之何嘗不是自此偈出佛再無言阿難再不問皆大歡喜佛與凡夫皆如是人全經皆如是說長白山樵李化熙閲注經即說偈曰瞥爾無明惑業蔓延于真空中諸法熾然轉大法輪塵霾盡掃妙高峰頭紅日杲杲釋迦饒舌𭥹絮空生此大居士再添葛藤蛇足婆心原無文字不住法門如是如是一齊和尚頌讚言之似有究來無真個金剛髓裡居迷時憑燈光曉夜蚤承願力示神珠蘧菴道人金之俊頌如是如是三藏十二部無不如是一千七百則公案無不如是雖然認作如是無有是處無是道人何故絮絮咄不聞晨市雞聲擾萬戶千門處處曉又偈若說有法則謗法若說有佛則謗佛若說無法併無佛無是道人又呌屈跋語萬曆間紫柏尊者以藏冊梵本繁重難以流通更於擕李楞嚴禪剎創置側理輕編使佛祖慧命得緇白交參其功並於日月琮謬膺衆推不揣綿力擔荷此重寄者三十餘載於茲矣所見金剛經注釋種類非一中有釋論三卷乃天親得之無著無著得十行偈於日光定中出定而授者嗣後謝靈運曇琛慧淨以至圭峯中峯各有發明未有現宰官身作如是解朗同懸鏡辨解連環能令義虎禪龍揮麈高談者且拱手韜翰如此其希有奇特者從今附藏而行將天壤有盡利益無窮豈止排衆苦永福壽而已哉主般若堂八十三歲老僧性琮和南謹識序說佛法者動借提唱影響焉伸指屈拳以為盡西來意噫教宗一而已瞽師避柱疾觸拭不岌岌舉十二部付一炬乎豫見坦公金剛經注始無齟齬不合也金剛乃為佛根基堅定不壞虗實有無相圓即至涅槃亦無首尾豈非衆經之軌則而必以伸指屈拳頑空雲霧兒說閇結不又數重須彌山數重流沙鰐水耶故觀其分次法忍總歸妙有不倚八正譬諸月自皎虗羣峰寂然不住究竟如如不動謂之正法象教三明十力不在斯編耶馬鳴悟道寶光手中華非落思搆組撰之藩認取太無坦公有焉諸公刻此覺律論儀則評唱宗鏡下以此燈照之今後珊瑚池諸大衆聞十三昧始知西來意神幢在此金剛定耳豫論與坦公合不涉于子影孫響二諱何分宗教真詮若謂十二部不基于此吾不信矣順治庚寅冬眷年社弟王鐸撰跋如是道人注金剛經成函一帙示余且命序之余平昔未讀佛氏書暗昧其理烏能妄置一辭然因是而有感也奚感乎蓋感夫道人生平履變而乃卒歸於如是也憶道人初當釋褐余與觀政同曹晨夕晤對靜如處女及至揚扢古今則洋洋灑灑鈎玄聆要如列眉如指掌吾知其為多聞出尹荒徼戈鋌滿地道人茹雪䬸氷半菽不飽日與鶉結之民扶傷弔死共相存活吾知其為廉慈入佐度支尋遷翰苑繼掌樞垣條畫之疏日凡數上及守制歸里時事大非猝俾重任甫及兩月柄臣議論紛紜諸竪罔主作姦讀道人縋賊一疏猶堪髮立吾知其為忠藎身為賊執欲挾而西計脫間走馳身西南號召草澤血口而盟者數萬人冀得逆賊而甘心焉此何異橋下劍博浪槌吾知其為俠烈至大憝就殲天命有定道人散徒黨解鞨布袍芒履投首轅門僑居轂下蕭然四壁口不言貧日尋黃冠師商確服餌吐納之術又取佛氏經以儒者名理分章闡釋超超玄著有如郭之注莊讀者止知其真實如義而不知舉世間一切聲華勳伐名根理障糾結而不可解者咸歸於是而破除焉世宙有壞金剛不壞金剛不壞此注亦不壞以如是理說如是法吾今而後不能知道人也北海老人書
